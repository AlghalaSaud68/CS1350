<!DOCTYPE html>
<html lang="en">
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="train-system-style.css">
</head>
<body>

<!-- Header -->
<div class="header">
  Train Schedule and Reservation Management System
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h3>Menu</h3>
    <button onclick="showSection('schedule')">Schedule Management</button>
    <button onclick="showSection('route')">Route & Time</button>
    <button id="capacityBtn" onclick="showSection('capacity')">Seat Capacity</button>
    <button onclick="showSection('booking')">Ticket Booking</button>
    <button onclick="showSection('passenger')">Passengers</button>

    <!--  Elaf Salah Al-Nasser -->
    <button id="reallocationBtn" onclick="showSection('reallocation')">Seat Management</button>
    <button id="reportsBtn" onclick="showSection('reports')">System Reports</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Schedule -->
    <div id="schedule" class="section">
      <h2>Train Schedule Management</h2>
      <input type="text" id="train" placeholder="Train Name">
      <button onclick="addSchedule()">Add Schedule</button>
    </div>

    <!-- Route -->
    <div id="route" class="section">
      <h2>Route and Time Definition</h2>
      <input type="text" id="routeInput" placeholder="Route">
      <input type="text" id="timeInput" placeholder="Time">
      <button onclick="addRoute()">Add</button>
    </div>

    <!-- Capacity -->
    <div id="capacity" class="section">
      <h2>Seat Capacity Configuration</h2>
      <input type="text" id="trainNameCap" placeholder="Train Name">
      <input type="number" id="cap" placeholder="Capacity">
      <button onclick="setCapacity()">Set</button>
    </div>

    <!-- Booking -->
    <div id="booking" class="section">
      <h2>Ticket Booking</h2>
      <input type="text" id="userName" placeholder="Your Name">
      <input type="text" id="trainName" placeholder="Train">
      <input type="number" id="ticketCount" placeholder="Number of Tickets" min="1">
      <button onclick="confirmBooking()">Book</button>
    </div>

    <!--  Elaf Salah Al-Nasser -->
    <!-- Seat Management -->
    <div id="reallocation" class="section">
      <h2>Seat Cancellation & Reallocation</h2>
      <input type="text" id="cancelTrain" placeholder="Enter Train Name">
      <button onclick="cancelBooking()">Cancel 1 Seat</button>
      <p id="cancelOutput"></p>
    </div>

    <!--  Elaf Salah Al-Nasser -->
    <!-- Reports -->
    <div id="reports" class="section">
      <h2>System Reports</h2>
      <button onclick="generateSummaryReport()">View Summary Report</button>
      <div id="reportBox" style="margin-top:20px; border:1px solid #ccc; padding:10px; display:none;">
        <h3>Operational Summary</h3>
        <p id="totalTrains"></p>
        <p id="totalBookings"></p>
      </div>
    </div>

    <!-- Output -->
    <p id="output"></p>

    <!-- Passenger Records -->
<div id="passenger" class="section">
  <h2>Passenger Records</h2>
  <input type="text" id="pName" placeholder="Name">
  <input type="text" id="pPhone" placeholder="Phone">
  <input type="text" id="pEmail" placeholder="Email">
  <button onclick="addPassenger()">Add Passenger</button>
</div>

  </div>
</div>

<!--  Elaf Salah Al-Nasser -->
<script src="train-system-app.js"></script>

</body>
</html>
